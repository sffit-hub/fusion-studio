services:
  - type: web
    name: studio-fusion-online
    env: node
    buildCommand: ""
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
    disk:
      name: studio-fusion-data
      mountPath: /var/data
      sizeGB: 1
